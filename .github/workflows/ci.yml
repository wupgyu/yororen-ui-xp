name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies (X11/Wayland for GPUI)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace

      - name: Test workspace
        run: cargo test --workspace

  publish:
    name: publish dry-run
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux system dependencies (X11/Wayland for GPUI)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev
      - name: cargo publish --dry-run for each crate in order
        run: |
          for crate in crates/yororen-ui-core crates/yororen-ui-theme-system crates/yororen-ui; do
            echo "=== $crate ==="
            cargo publish --dry-run --allow-dirty -p $(basename $crate | tr '-' '_') || exit 1
          done

  visual-regression:
    # Phase F-δ: visual-regression test for the Catppuccin theme.
    # Currently uses a "theme-snapshot" test (every renderer's
    # output captured for both Latte and Mocha; regression test
    # asserts light/dark differ) rather than pixel-level
    # screenshots, because gpui-ce 0.3.3 has no public API to
    # render to an offscreen surface. The pixel-level screenshot
    # job is reserved for when gpui-ce gains offscreen support
    # (likely gpui-ce 0.4+).
    name: theme visual regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
      - name: Run theme snapshot test
        # This test exercises every Catppuccin renderer for
        # every (light, dark) pair and asserts the output
        # differs. It's the F-α regression test (catches
        # hardcoded `palette::mocha::*`).
        run: cargo test -p yororen_ui_theme_catppuccin --lib snapshot
      - name: Run theme-showcase coverage test
        # Verifies the demo's catppuccin_renderer_only() covers
        # all 37 renderers (F-γ hard requirement).
        run: cargo test -p theme-showcase-demo --lib catppuccin_renderer_only_covers_all_renderers
